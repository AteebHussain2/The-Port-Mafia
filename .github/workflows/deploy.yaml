name: Deploy The Port Mafia

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Run Containerized Stack
    runs-on: [self-hosted, steiners-local]

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Create Frontend Environment File
        run: |
          mkdir -p frontend
          cat <<EOF > frontend/.env
          JWT_PUBLIC_KEY="${{ secrets.JWT_PUBLIC_KEY }}"
          HOME_URL="${{ secrets.HOME_URL }}"
          SERVER_URL="${{ secrets.SERVER_URL }}"
          NODE_ENV="production"
          EOF

      - name: Create API Gateway Environment File
        run: |
          mkdir -p backend/api-gateway
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" > backend/api-gateway/.env

      - name: Standardize and Rebuild Containers
        run: |
          docker compose down --remove-orphans
          docker compose up --build -d
          docker image prune -f